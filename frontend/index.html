<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a2e1a">
<title>Agro Asistents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --soil: #1a2e1a;
    --soil-mid: #243524;
    --soil-light: #2f4a2f;
    --leaf: #4a7c4a;
    --leaf-bright: #6aaa5a;
    --wheat: #c9a84c;
    --wheat-light: #e8c96a;
    --sky: #e8f0e8;
    --fog: #f4f7f4;
    --ink: #1a2e1a;
    --muted: #5a7a5a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--fog);
    color: var(--ink);
  }

  /* ── Layout shell ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 640px;
    margin: 0 auto;
    background: var(--fog);
  }

  /* ── Header ── */
  .header {
    background: var(--soil);
    color: #fff;
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
  }
  .header-icon {
    width: 38px; height: 38px;
    background: var(--leaf);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: #fff;
    line-height: 1.1;
  }
  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 1px;
    font-weight: 300;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--leaf-bright);
    margin-left: auto;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Context bar ── */
  .context-bar {
    background: var(--soil-mid);
    padding: 8px 20px;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .context-bar::-webkit-scrollbar { display: none; }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    font-weight: 300;
  }
  .ctx-val {
    color: var(--wheat-light);
    font-weight: 500;
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--leaf); border-radius: 2px; }

  /* Welcome state */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    gap: 20px;
  }
  .welcome-icon {
    width: 72px; height: 72px;
    background: var(--soil);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .welcome h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--soil);
  }
  .welcome p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 280px;
  }
  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 320px;
  }
  .suggestion {
    background: #fff;
    border: 1px solid #d4e4d4;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--soil);
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
  }
  .suggestion:hover { background: var(--sky); border-color: var(--leaf); }
  .suggestion span { font-size: 16px; }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 8px;
    animation: fadeUp .25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }
  .msg.ai .msg-avatar { background: var(--soil); }
  .msg.user .msg-avatar { background: var(--wheat); }

  .msg-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }
  .msg.ai .msg-bubble {
    background: #fff;
    border: 0.5px solid #d4e4d4;
    border-bottom-left-radius: 4px;
    color: var(--ink);
  }
  .msg.user .msg-bubble {
    background: var(--soil);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--leaf);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Section headers in AI response */
  .msg-bubble strong {
    display: block;
    font-weight: 500;
    color: var(--soil);
    margin: 8px 0 2px;
    font-size: 13px;
  }
  .msg-bubble strong:first-child { margin-top: 0; }

  /* Weather card in messages */
  .weather-card {
    background: var(--soil);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: #fff;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .wc-item label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: .05em;
    display: block;
    margin-bottom: 2px;
  }
  .wc-item span {
    font-size: 16px;
    font-weight: 500;
    color: var(--wheat-light);
  }
  .wc-item small { font-size: 11px; color: rgba(255,255,255,0.55); }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: #fff;
    border: 0.5px solid #d4e4d4;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--leaf);
    animation: bounce .8s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* ── Input area ── */
  .input-area {
    background: #fff;
    border-top: 1px solid #d4e4d4;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--fog);
    border: 1.5px solid #c4d8c4;
    border-radius: 20px;
    padding: 6px 6px 6px 14px;
    transition: border-color .15s;
  }
  .input-row:focus-within { border-color: var(--leaf); }

  #msg-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    resize: none;
    outline: none;
    max-height: 100px;
    min-height: 24px;
    line-height: 1.4;
    padding: 4px 0;
  }
  #msg-input::placeholder { color: #8aaa8a; }

  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
    font-size: 16px;
  }
  #voice-btn {
    background: var(--sky);
    color: var(--soil);
  }
  #voice-btn.listening {
    background: #fde8e8;
    color: #c0392b;
    animation: voicePulse 1s ease infinite;
  }
  @keyframes voicePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  #send-btn {
    background: var(--soil);
    color: #fff;
  }
  #send-btn:hover { background: var(--soil-light); }
  #send-btn:disabled { background: #c4d8c4; cursor: not-allowed; }
  .btn-icon:active { transform: scale(0.93); }

  /* GPS bar */
  .gps-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 2px 0;
  }
  .gps-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--leaf-bright);
    flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--soil);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all .3s;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Landscape adjustments */
  @media (orientation: landscape) and (max-height: 500px) {
    .header { padding: 8px 20px; }
    .context-bar { display: none; }
    .welcome { gap: 12px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🌾</div>
    <div class="header-text">
      <h1>Agro Asistents</h1>
      <p>AI konsultants Latvijas zemniekiem</p>
    </div>
    <div class="status-dot" id="status-dot" title="Savienots"></div>
  </div>

  <!-- Live context bar -->
  <div class="context-bar" id="ctx-bar">
    <div class="ctx-item">🌡️ <span class="ctx-val" id="ctx-temp">—</span></div>
    <div class="ctx-item">💧 <span class="ctx-val" id="ctx-humid">—</span></div>
    <div class="ctx-item">💨 <span class="ctx-val" id="ctx-wind">—</span></div>
    <div class="ctx-item">🌧️ <span class="ctx-val" id="ctx-precip">—</span></div>
    <div class="ctx-item">🛰️ <span class="ctx-val" id="ctx-ndvi">—</span></div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🌱</div>
      <h2>Sveiks, zemnieks!</h2>
      <p>Uzdod jautājumu par laiku, kultūraugiem, pesticīdiem vai lauka darbu plānošanu.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="Kādi laika apstākļi ir šodien un vai varu izsmidzināt fungicīdu?">
          <span>🌦️</span> Laiks un izsmidzināšana
        </button>
        <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="Kādu fungicīdu lietot kviešiem pret brūno rūsu?">
          <span>🌾</span> Fungicīds pret rūsu
        </button>
        <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="Kāds ir augsnes mitrums un temperatūra šodien?">
          <span>🌱</span> Augsnes stāvoklis
        </button>
        <button class="suggestion" onclick="sendSuggestion(this.dataset.q)" data-q="Kad labākais laiks lietot herbicīdu?">
          <span>🌿</span> Herbicīda lietošanas laiks
        </button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Uzdod jautājumu latviski..." rows="1"></textarea>
      <button class="btn-icon" id="voice-btn" title="Balss ievade" onclick="toggleVoice()">🎤</button>
      <button class="btn-icon" id="send-btn" title="Sūtīt" onclick="sendMessage()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="gps-bar">
      <div class="gps-dot" id="gps-dot"></div>
      <span id="gps-label">GPS tiek noteikts...</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8000';
let lat = 56.9496, lon = 24.1052; // default Riga
let gpsReady = false;
let isListening = false;
let recognition = null;
let history = [];
let streaming = false;

// ── GPS ──────────────────────────────────────────────────────────────────────
function initGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gps-label').textContent = 'GPS nav pieejams — tiek izmantota Rīga';
    return;
  }
  navigator.geolocation.watchPosition(pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    gpsReady = true;
    document.getElementById('gps-dot').style.background = '#6aaa5a';
    document.getElementById('gps-label').textContent =
      `GPS: ${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E`;
    loadWeather();
  }, () => {
    document.getElementById('gps-label').textContent = 'GPS nav pieejams — tiek izmantota Rīga';
    loadWeather();
  }, { enableHighAccuracy: true, maximumAge: 30000 });
}

// ── Weather context bar ───────────────────────────────────────────────────────
async function loadWeather() {
  try {
    const r = await fetch(`${API}/weather?lat=${lat}&lon=${lon}`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    const cur = d.current || {};
    const h = d.hourly || {};
    const precip24 = (h.precipitation || []).slice(0, 24).reduce((a, b) => a + b, 0);

    document.getElementById('ctx-temp').textContent = cur.temperature_2m + '°C';
    document.getElementById('ctx-humid').textContent = cur.relative_humidity_2m + '%';
    document.getElementById('ctx-wind').textContent = cur.wind_speed_10m + ' km/h';
    document.getElementById('ctx-precip').textContent = precip24.toFixed(1) + 'mm';
    document.getElementById('status-dot').style.background = '#6aaa5a';
  } catch {
    document.getElementById('status-dot').style.background = '#e74c3c';
    document.getElementById('status-dot').title = 'Nav savienojuma';
  }
}

// ── Input auto-resize ─────────────────────────────────────────────────────────
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  sendBtn.disabled = !input.value.trim() || streaming;
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

// ── Voice ─────────────────────────────────────────────────────────────────────
function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voice-btn').style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'lv-LV';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    input.value = transcript;
    input.dispatchEvent(new Event('input'));
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('voice-btn').classList.remove('listening');
    document.getElementById('voice-btn').textContent = '🎤';
    if (input.value.trim()) sendMessage();
  };
  recognition.onerror = () => {
    isListening = false;
    document.getElementById('voice-btn').classList.remove('listening');
    document.getElementById('voice-btn').textContent = '🎤';
    showToast('Balss ievade neizdevās');
  };
}

function toggleVoice() {
  if (!recognition) { showToast('Balss ievade nav pieejama šajā pārlūkā'); return; }
  if (isListening) {
    recognition.stop();
  } else {
    isListening = true;
    document.getElementById('voice-btn').classList.add('listening');
    document.getElementById('voice-btn').textContent = '⏹️';
    input.value = '';
    input.dispatchEvent(new Event('input'));
    showToast('Runā latviski...');
    recognition.start();
  }
}

// ── Messages ──────────────────────────────────────────────────────────────────
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(role, text) {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '🌾' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function addTyping() {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🌾';

  const bubble = document.createElement('div');
  bubble.className = 'typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^(1\.|2\.|3\.)(.+)/gm, '<strong>$1$2</strong>')
    .replace(/\n\n/g, '</p><p style="margin-top:6px">')
    .replace(/\n/g, '<br>');
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text || streaming) return;

  streaming = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  addTyping();

  history.push({ role: 'user', content: text });

  try {
    const resp = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        lat, lon,
        conversation_history: history.slice(-8)
      })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    removeTyping();
    const bubble = addMessage('ai', '');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      full += chunk;
      bubble.innerHTML = formatText(full);
      bubble.appendChild(cursor);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    cursor.remove();
    bubble.innerHTML = formatText(full);
    history.push({ role: 'assistant', content: full });

  } catch (e) {
    removeTyping();
    addMessage('ai', '⚠️ Neizdevās savienoties ar serveri. Pārbaudiet, vai backend darbojas uz localhost:8000.');
    showToast('Savienojuma kļūda');
  }

  streaming = false;
  sendBtn.disabled = !input.value.trim();
}

function sendSuggestion(q) {
  input.value = q;
  input.dispatchEvent(new Event('input'));
  sendMessage();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
initGPS();
initVoice();
loadWeather();
</script>
</body>
</html>
